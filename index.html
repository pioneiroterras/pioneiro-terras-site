<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pioneiro Terras</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --preto:#0d0d0d; --verde-esc:#1b2e1b; --verde-mil:#2e4a2e;
    --verde-oliva:#556b2f; --dourado:#c9a84c; --dourado-c:#e8c97a;
    --creme:#f0e8d5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Raleway',sans-serif;
    background:var(--preto);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 15% 10%,rgba(61,107,61,.35) 0%,transparent 45%),
      radial-gradient(ellipse at 85% 90%,rgba(46,74,46,.4) 0%,transparent 50%),
      linear-gradient(160deg,#0d0d0d 0%,#111a11 50%,#0d0d0d 100%);
    pointer-events:none;
  }
  body::after{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(201,168,76,.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(201,168,76,.035) 1px,transparent 1px);
    background-size:36px 36px;pointer-events:none;
  }
  .container{width:100%;max-width:460px;padding:44px 24px 60px;position:relative;z-index:1}

  .header{text-align:center;margin-bottom:38px;animation:fadeDown .9s ease both}
  .logo-wrap{width:200px;height:200px;margin:0 auto 20px;position:relative}
  .logo-wrap::before{
    content:'';position:absolute;inset:-10px;border-radius:16px;
    background:radial-gradient(ellipse at center,rgba(201,168,76,.22) 0%,transparent 70%);
    animation:pulse-glow 3s ease-in-out infinite;
  }
  .logo-img{width:100%;height:100%;object-fit:contain;border-radius:12px;position:relative;z-index:1;
    filter:drop-shadow(0 6px 24px rgba(201,168,76,.4));}

  .divider-ornament{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0 12px}
  .divider-line{flex:1;max-width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--dourado))}
  .divider-line.r{background:linear-gradient(90deg,var(--dourado),transparent)}
  .divider-diamond{width:6px;height:6px;background:var(--dourado);transform:rotate(45deg);box-shadow:0 0 8px rgba(201,168,76,.6)}
  .slogan{font-size:.82rem;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--dourado-c);opacity:.9}

  .links-section{display:flex;flex-direction:column;gap:12px;margin-bottom:36px}
  .link-item{
    display:flex;align-items:center;gap:14px;padding:15px 20px;border-radius:10px;
    text-decoration:none;position:relative;overflow:hidden;cursor:pointer;
    transition:transform .22s ease,box-shadow .22s ease;
    animation:fadeUp .6s ease both;border:1px solid rgba(201,168,76,.18);
  }
  .link-item::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.06) 50%,transparent 70%);
    transform:translateX(-100%);transition:transform .5s ease;
  }
  .link-item:hover::after{transform:translateX(100%)}
  .link-item:hover{transform:translateY(-3px) scale(1.015);box-shadow:0 10px 32px rgba(0,0,0,.5),0 0 24px rgba(201,168,76,.12)}
  .insta{background:linear-gradient(135deg,#1a1f1a,#2a1a2a);animation-delay:.10s}
  .face{background:linear-gradient(135deg,#0f1f1a,#1a2f40);animation-delay:.18s}
  .yt{background:linear-gradient(135deg,#1a1a0f,#2a1010);animation-delay:.26s}
  .tt{background:linear-gradient(135deg,#0d0d0d,#1a2e2e);animation-delay:.34s}
  .wa{background:linear-gradient(135deg,#0f1f0f,#1a3a1a);animation-delay:.42s}
  .link-icon{
    width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;border:1px solid rgba(201,168,76,.25);background:rgba(201,168,76,.08);
  }
  .link-icon svg{width:20px;height:20px;fill:var(--dourado-c)}
  .link-content{flex:1}
  .link-platform{font-size:.58rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dourado);opacity:.8;margin-bottom:2px}
  .link-label{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:var(--creme);letter-spacing:.04em}
  .link-arrow{color:var(--dourado);opacity:.5;font-size:1.3rem;flex-shrink:0;transition:opacity .2s,transform .2s}
  .link-item:hover .link-arrow{opacity:1;transform:translateX(3px)}

  .identity-section{
    background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.2);
    border-radius:14px;padding:22px 20px;margin-bottom:30px;
    animation:fadeUp .6s .5s ease both;
  }
  .identity-title{font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dourado);margin-bottom:18px;text-align:center}
  .color-palette{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
  .color-chip{display:flex;flex-direction:column;align-items:center;gap:6px}
  .color-circle{width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);box-shadow:0 2px 12px rgba(0,0,0,.4)}
  .color-name{font-size:.48rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1.3}
  .font-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .font-chip{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.12);border-radius:8px;padding:10px 12px;text-align:center}
  .font-sample-d{font-family:'Oswald',sans-serif;font-size:1rem;color:var(--dourado-c);font-weight:700;letter-spacing:.08em;margin-bottom:4px}
  .font-sample-b{font-family:'Raleway',sans-serif;font-size:.85rem;color:rgba(255,255,255,.65);margin-bottom:4px}
  .font-label{font-size:.48rem;color:rgba(255,255,255,.28);letter-spacing:.15em;text-transform:uppercase}

  .videos-section{margin-bottom:36px;animation:fadeUp .6s .55s ease both}
  .videos-title{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:20px}
  .videos-title-text{font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dourado)}
  .video-card{border:1px solid rgba(201,168,76,.2);border-radius:12px;overflow:hidden;margin-bottom:14px;background:rgba(255,255,255,.02);transition:transform .22s ease,box-shadow .22s ease}
  .video-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.5),0 0 24px rgba(201,168,76,.12)}
  .video-card iframe{display:block;width:100%;aspect-ratio:16/9;border:none}
  .videos-estado{text-align:center;font-size:.78rem;color:rgba(240,232,213,.55);padding:18px 0;letter-spacing:.04em}
  .videos-estado a{color:var(--dourado-c);text-decoration:underline}

  .footer{text-align:center;animation:fadeUp .6s .65s ease both}
  .footer-text{font-family:'Oswald',sans-serif;font-size:.62rem;color:rgba(255,255,255,.18);letter-spacing:.3em;text-transform:uppercase}
  .footer-div{width:28px;height:1px;background:rgba(201,168,76,.25);margin:8px auto}
  .footer-creci{font-size:.55rem;color:rgba(255,255,255,.15);letter-spacing:.12em;text-transform:uppercase}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse-glow{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

  .hero-banner{width:100%;max-width:680px;margin:0 auto 28px;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.25)}
  .hero-banner img{width:100%;display:block;height:auto}

  /* === Botão Venda Meu Imóvel === */
  .sell-btn-wrap{text-align:center;margin:30px 0 10px}
  .sell-btn{
    display:inline-block;padding:15px 38px;border-radius:10px;
    background:linear-gradient(135deg,#7B0000,#B91C2C);
    color:#C9A84C;font-family:'Oswald',sans-serif;font-size:1.05rem;
    font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    text-decoration:none;border:2px solid #C9A84C;
    box-shadow:0 4px 20px rgba(120,0,0,.5),0 0 14px rgba(201,168,76,.15);
    transition:transform .22s ease,box-shadow .22s ease;
  }
  .sell-btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 8px 30px rgba(120,0,0,.65),0 0 22px rgba(201,168,76,.3);
  }
</style>

<script>
  // Busca os últimos vídeos do canal via a Function /api/videos (RSS, sem API key).
  (async function () {
    var box = document.getElementById('videos-dinamicos');
    var estado = box.querySelector('.videos-estado');
    try {
      var res = await fetch('/api/videos');
      if (!res.ok) throw new Error('falha');
      var data = await res.json();
      var lista = (data.videos || []).slice(0, 4);
      if (!lista.length) {
        estado.textContent = 'Nenhum vídeo disponível no momento.';
        return;
      }
      box.innerHTML = lista.map(function (v) {
        return '<div class="video-card"><iframe src="https://www.youtube.com/embed/' +
               v.id + '" allowfullscreen loading="lazy" title="' +
               (v.title || 'Vídeo Pioneiro Terras').replace(/"/g, '&quot;') +
               '"></iframe></div>';
      }).join('');
    } catch (e) {
      estado.innerHTML = 'Não foi possível carregar os vídeos agora. ' +
        '<a href="https://youtube.com/@pioneiroterraspr" target="_blank" rel="noopener">Ver no YouTube</a>.';
    }
  })();
</script>
